name: Radar Geek SP - Sprawl Worker

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # Esteira de mineração roda 1x ao dia (00:00 UTC)
    - cron: '0 0 * * *'
    # Consolidação da Fila roda a cada 2 horas (no minuto 30 para evitar sobreposição)
    - cron: '30 */2 * * *'
    # Esteira de manutenção roda 1x por dia às 03:00 UTC
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      routine:
        description: 'Qual rotina rodar?'
        required: true
        default: 'scrape'
        type: choice
        options:
        - scrape
        - process-queue
        - cleanup
        - maintenance

jobs:
  run-worker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies
        run: npm install @google/generative-ai openai

      - name: Run Scrape Routine (Cron)
        if: github.event.schedule == '0 0 * * *' || github.event.inputs.routine == 'scrape'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: node backend/worker.js --scrape

      - name: Consolidar Pesquisa (Processar Fila)
        if: |
          github.event.inputs.routine == 'process-queue' ||
          (github.event_name == 'schedule' && github.event.schedule != '0 0 * * *' && github.event.schedule != '0 3 * * *')
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: node backend/worker.js --process-queue

      - name: Limpeza da Base (Remove eventos nao-nerd)
        if: github.event.inputs.routine == 'cleanup'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: node backend/worker.js --cleanup

      - name: Run Maintenance Routine (Cron)
        if: github.event.schedule == '0 3 * * *' || github.event.inputs.routine == 'maintenance'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: node backend/worker.js --maintenance
